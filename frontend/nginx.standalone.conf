# Standalone SPA serving only. No API proxy here, since a standalone
# frontend deployment implies the API lives at a different origin -
# configure CORS_ORIGINS on the backend to allow whatever origin this
# gets deployed to, and ensure the app is built with the correct API base
# URL for that setup.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location ~* \.(?:js|css|svg|png|jpg|jpeg|gif|ico|woff2?|ttf|map)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
