[pytest]
# Test discovery
testpaths = tests
python_files  = test_*.py
python_classes = Test*
python_functions = test_*

# Default flags: verbose output, short tracebacks
addopts =
    -v
    --tb=short
    --strict-markers

# Custom markers (suppresses PytestUnknownMarkWarning)
markers =
    slow: marks tests as slow (deselect with: -m "not slow")
    integration: marks tests that require live external services
