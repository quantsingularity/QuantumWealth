# Before running `docker compose up`, create code/backend/.env from
# code/backend/.env.example and fill in real values. Every service below
# loads that file via env_file, so this is the single source of truth for
# both local (non-Docker) and Docker Compose runs.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./code/backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./code/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn quantumwealth.wsgi:application
               --bind 0.0.0.0:8000
               --workers 4
               --timeout 120
               --log-level info"
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
      - ./code/ai_models:/app/ai_models:ro
    env_file:
      - ./code/backend/.env
    environment:
      # These three must differ from local-dev .env values (which point at
      # localhost) regardless of what's in the .env file, so they stay as
      # explicit overrides - Compose always prefers an explicit environment
      # entry over the same key loaded from env_file.
      DJANGO_SETTINGS_MODULE: quantumwealth.settings.production
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/schema/"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery_worker:
    build:
      context: ./code/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A quantumwealth worker --loglevel=info --concurrency=4
    volumes:
      - ./code/ai_models:/app/ai_models:ro
    env_file:
      - ./code/backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: quantumwealth.settings.production
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - backend
      - redis
      - db

  celery_beat:
    build:
      context: ./code/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A quantumwealth beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./code/ai_models:/app/ai_models:ro
    env_file:
      - ./code/backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: quantumwealth.settings.production
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - backend
      - redis
      - db

  frontend-build:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_dist:/app/dist
    command: sh -c "npm ci && npm run build"

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
    depends_on:
      frontend-build:
        condition: service_completed_successfully
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:
  frontend_node_modules:
  frontend_dist:
